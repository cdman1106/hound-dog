<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#080102" />
  <title>HOUND DOG | NFC ROCK EXPERIENCE</title>

  <style>
    :root {
      --red: #e31922;
      --red-light: #ff4650;
      --black: #070102;
      --panel: rgba(8, 2, 4, 0.78);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-width: 320px;
      min-height: 100%;
      background: var(--black);
      color: #fff;
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Helvetica Neue",
        "Hiragino Kaku Gothic ProN",
        "Yu Gothic",
        sans-serif;
    }

    .background {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at top, #64050a 0%, #120003 48%, #000 100%);
    }

    .background img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      filter: saturate(1.15) contrast(1.08);
      transform: scale(1.03);
    }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0.16) 0%,
          rgba(0, 0, 0, 0.32) 30%,
          rgba(0, 0, 0, 0.78) 65%,
          rgba(0, 0, 0, 0.98) 100%
        );
    }

    .page {
      position: relative;
      z-index: 2;
      width: min(100%, 560px);
      min-height: 100svh;
      margin: 0 auto;
      padding:
        max(28px, env(safe-area-inset-top))
        16px
        max(44px, env(safe-area-inset-bottom));
      text-align: center;
    }

    .eyebrow {
      margin: 0 0 18px;
      color: var(--red-light);
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 5px;
      text-shadow: 0 0 14px rgba(255, 0, 0, 0.7);
    }

    h1 {
      margin: 0;
      color: var(--red);
      font-size: clamp(50px, 14vw, 78px);
      line-height: 0.86;
      font-weight: 1000;
      letter-spacing: -3px;
      text-shadow:
        0 0 18px rgba(255, 0, 0, 0.58),
        0 8px 25px rgba(0, 0, 0, 0.9);
    }

    .catch {
      margin: 18px 0 6px;
      font-size: clamp(23px, 6.8vw, 32px);
      font-weight: 900;
      letter-spacing: 0.08em;
      text-shadow: 0 3px 14px #000;
    }

    .since {
      margin: 0 0 26px;
      color: var(--red-light);
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 7px;
    }

    .disc-button {
      position: relative;
      display: block;
      width: min(84vw, 400px);
      aspect-ratio: 1;
      margin: 0 auto;
      padding: 0;
      overflow: hidden;
      border: 0;
      border-radius: 50%;
      background: #140001;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      filter: drop-shadow(0 0 30px rgba(255, 0, 0, 0.62));
    }

    .disc-button:disabled {
      cursor: wait;
      opacity: 0.75;
    }

    .disc-button:active:not(:disabled) {
      transform: scale(0.97);
    }

    .disc-button img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      animation: disc-spin 12s linear infinite;
      animation-play-state: paused;
    }

    .disc-button.playing img {
      animation-duration: 3.8s;
      animation-play-state: running;
    }

    @keyframes disc-spin {
      to {
        transform: rotate(360deg);
      }
    }

    .disc-status {
      position: absolute;
      left: 50%;
      bottom: 16px;
      width: max-content;
      max-width: calc(100% - 28px);
      padding: 10px 15px;
      transform: translateX(-50%);
      border: 1px solid rgba(255, 70, 80, 0.95);
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.76);
      color: #fff;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.04em;
      box-shadow: 0 0 20px rgba(255, 0, 0, 0.32);
      pointer-events: none;
    }

    .disc-button.playing .disc-status {
      color: var(--red-light);
    }

    .spotify-box {
      margin-top: 18px;
      overflow: hidden;
      border: 1px solid rgba(255, 70, 80, 0.5);
      border-radius: 17px;
      background: rgba(0, 0, 0, 0.76);
      box-shadow: 0 0 28px rgba(255, 0, 0, 0.2);
    }

    #spotifyPlayer iframe {
      display: block;
      border: 0;
    }

    .fallback {
      display: none;
      margin: 14px 0 0;
      padding: 14px;
      border: 1px solid rgba(255, 70, 80, 0.75);
      border-radius: 14px;
      background: rgba(32, 0, 3, 0.88);
      color: #fff;
      font-size: 13px;
      line-height: 1.6;
    }

    .fallback.show {
      display: block;
    }

    .fallback a {
      display: inline-block;
      margin-top: 8px;
      color: var(--red-light);
      font-weight: 900;
      text-decoration: none;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin: 30px 0 16px;
      color: var(--red-light);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 4px;
      text-shadow: 0 0 12px rgba(255, 0, 0, 0.55);
    }

    .section-title::before,
    .section-title::after {
      content: "";
      width: 44px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--red));
    }

    .section-title::after {
      transform: scaleX(-1);
    }

    .track-list {
      display: grid;
      gap: 10px;
    }

    .track {
      display: flex;
      align-items: center;
      width: 100%;
      min-height: 68px;
      padding: 12px;
      gap: 13px;
      border: 1px solid rgba(255, 70, 80, 0.58);
      border-radius: 15px;
      background: var(--panel);
      color: #fff;
      text-align: left;
      cursor: pointer;
      touch-action: manipulation;
      backdrop-filter: blur(10px);
      -webkit-tap-highlight-color: transparent;
    }

    .track:active {
      transform: scale(0.985);
    }

    .track.active {
      border-color: var(--red-light);
      background: rgba(60, 0, 5, 0.84);
      box-shadow: 0 0 22px rgba(255, 0, 0, 0.26);
    }

    .track-play {
      display: grid;
      flex: 0 0 auto;
      width: 38px;
      height: 38px;
      place-items: center;
      border: 1px solid var(--red-light);
      border-radius: 50%;
      color: var(--red-light);
      font-size: 13px;
    }

    .track-info {
      min-width: 0;
      flex: 1;
    }

    .track-name {
      overflow: hidden;
      font-size: 15px;
      font-weight: 900;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .track-artist {
      margin-top: 4px;
      color: #aaa;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    .spotify-link {
      display: block;
      margin-top: 24px;
      padding: 17px 18px;
      border: 1px solid var(--red-light);
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.8);
      color: var(--red-light);
      font-size: 15px;
      font-weight: 900;
      text-decoration: none;
      box-shadow: 0 0 25px rgba(255, 0, 0, 0.2);
    }

    .footer {
      margin-top: 34px;
      color: rgba(255, 255, 255, 0.46);
      font-size: 10px;
      letter-spacing: 3px;
    }

    @media (min-width: 700px) {
      .track-list {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="background">
    <img
      id="backgroundImage"
      alt=""
      src="https://www.dropbox.com/scl/fi/0x2h9qhdj1jv1cf0z5kh8/file_0000000008e87206ad7e60e684a83658.png?rlkey=lb32ulzece5bmrogeps69ldvv&raw=1"
    />
  </div>

  <div class="overlay"></div>

  <main class="page">
    <p class="eyebrow">NFC ROCK EXPERIENCE</p>

    <h1>HOUND DOG</h1>
    <div class="catch">魂を鳴らせ。</div>
    <p class="since">SINCE 1980</p>

    <button class="disc-button" id="discButton" disabled>
      <img
        id="discImage"
        src="https://www.dropbox.com/scl/fi/yc0f5c9fdpr7sbpfkciik/file_00000000553c7206959bc4005be382a2.png?rlkey=19nw5pfemvjgizpizkxup7yda&raw=1"
        alt="HOUND DOG CD"
      />
      <span class="disc-status" id="discStatus">
        Spotifyを準備中...
      </span>
    </button>

    <div class="spotify-box">
      <div id="spotifyPlayer"></div>
    </div>

    <div class="fallback" id="fallback">
      この端末ではCDからの直接再生が制限されています。<br />
      上のSpotifyプレーヤーの再生ボタンを押してください。

      <br />

      <a id="openSpotifyApp" href="#" target="_blank" rel="noopener">
        Spotifyアプリで開く →
      </a>
    </div>

    <div class="section-title">PLAY MUSIC</div>

    <div class="track-list" id="trackList"></div>

    <a
      id="openSpotify"
      class="spotify-link"
      href="#"
      target="_blank"
      rel="noopener"
    >
      Spotifyでこの曲を開く →
    </a>

    <div class="footer">© NFC ROCK EXPERIENCE</div>
  </main>

  <script>
    const songs = [
      {
        title: "ff（フォルティシモ）",
        uri: "spotify:track:23a4YCoujGcwDqbD9HWLrC",
        url: "https://open.spotify.com/track/23a4YCoujGcwDqbD9HWLrC"
      },
      {
        title: "BRIDGE ～あの橋をわたるとき～",
        uri: "spotify:track:10NFZL2J9DG8qrCDEP4mPX",
        url: "https://open.spotify.com/track/10NFZL2J9DG8qrCDEP4mPX"
      },
      {
        title: "ONLY LOVE",
        uri: "spotify:track:6iy11k0Q215DqrCrlG9RXZ",
        url: "https://open.spotify.com/track/6iy11k0Q215DqrCrlG9RXZ"
      },
      {
        title: "ROCKS",
        uri: "spotify:track:3mFxdqsVSvuZCmkqZFC5fb",
        url: "https://open.spotify.com/track/3mFxdqsVSvuZCmkqZFC5fb"
      },
      {
        title: "嵐の金曜日",
        uri: "spotify:track:6HKA6Ui8yNm7dteVTdAxXk",
        url: "https://open.spotify.com/track/6HKA6Ui8yNm7dteVTdAxXk"
      },
      {
        title: "ROAD RUNNER",
        uri: "spotify:track:7hmRDnVwx3HOz43CLDzqFp",
        url: "https://open.spotify.com/track/7hmRDnVwx3HOz43CLDzqFp"
      },
      {
        title: "涙のBIRTHDAY",
        uri: "spotify:track:3Dbd28QRK3z1Waqx6vrE3P",
        url: "https://open.spotify.com/track/3Dbd28QRK3z1Waqx6vrE3P"
      },
      {
        title: "ラスト・ヒーロー",
        uri: "spotify:track:645Z7lCQ3SXdBXNtr63F1e",
        url: "https://open.spotify.com/track/645Z7lCQ3SXdBXNtr63F1e"
      },
      {
        title: "AMBITIOUS",
        uri: "spotify:track:5qu5qgWJxtH1X0RmZX3G3O",
        url: "https://open.spotify.com/track/5qu5qgWJxtH1X0RmZX3G3O"
      },
      {
        title: "DESTINY",
        uri: "spotify:track:7pazzaYxkgKTRYd1wG2jRn",
        url: "https://open.spotify.com/track/7pazzaYxkgKTRYd1wG2jRn"
      },
      {
        title: "SMILE FOR ME",
        uri: "spotify:track:30aAjH1IYIvvc4k5mf1iOj",
        url: "https://open.spotify.com/track/30aAjH1IYIvvc4k5mf1iOj"
      },
      {
        title: "ラスト・シーン",
        uri: "spotify:track:3qkt42ayMxu0gsyhYhWpLc",
        url: "https://open.spotify.com/track/3qkt42ayMxu0gsyhYhWpLc"
      }
    ];

    const discButton = document.getElementById("discButton");
    const discStatus = document.getElementById("discStatus");
    const trackList = document.getElementById("trackList");
    const openSpotify = document.getElementById("openSpotify");
    const openSpotifyApp = document.getElementById("openSpotifyApp");
    const fallback = document.getElementById("fallback");

    let controller = null;
    let controllerReady = false;
    let isPlaying = false;
    let currentSong = songs[0];
    let fallbackTimer = null;

    function setDiscState(playing, message = "") {
      isPlaying = playing;

      discButton.classList.toggle("playing", playing);

      if (message) {
        discStatus.textContent = message;
        return;
      }

      discStatus.textContent = playing
        ? "❚❚ タップで一時停止"
        : `▶ ${currentSong.title} を再生`;
    }

    function updateLinks() {
      openSpotify.href = currentSong.url;
      openSpotify.textContent = `Spotifyで「${currentSong.title}」を開く →`;

      openSpotifyApp.href = currentSong.url;
    }

    function renderTracks() {
      trackList.innerHTML = songs.map((song, index) => `
        <button
          class="track ${index === 0 ? "active" : ""}"
          data-uri="${song.uri}"
          data-url="${song.url}"
          data-title="${song.title}"
        >
          <span class="track-play">▶</span>

          <span class="track-info">
            <span class="track-name">${song.title}</span>
            <span class="track-artist">大友康平 / HOUND DOG</span>
          </span>
        </button>
      `).join("");

      document.querySelectorAll(".track").forEach((button) => {
        button.addEventListener("click", () => {
          if (!controllerReady) return;

          currentSong = {
            title: button.dataset.title,
            uri: button.dataset.uri,
            url: button.dataset.url
          };

          document.querySelectorAll(".track").forEach((item) => {
            item.classList.toggle("active", item === button);
          });

          clearTimeout(fallbackTimer);
          fallback.classList.remove("show");

          controller.pause();
          controller.loadEntity(currentSong.uri);

          updateLinks();
          setDiscState(false, `${currentSong.title} をセットしました`);
        });
      });
    }

    renderTracks();
    updateLinks();

    discButton.addEventListener("click", () => {
      if (!controllerReady) return;

      clearTimeout(fallbackTimer);
      fallback.classList.remove("show");

      /*
        重要：
        CDタップのクリック処理の中で直接togglePlayする。
        非同期のsetTimeout後にplayしないので、
        スマホの自動再生制限に引っかかりにくい。
      */
      controller.togglePlay();

      fallbackTimer = setTimeout(() => {
        if (!isPlaying) {
          fallback.classList.add("show");
        }
      }, 1800);
    });

    window.onSpotifyIframeApiReady = (IFrameAPI) => {
      IFrameAPI.createController(
        document.getElementById("spotifyPlayer"),
        {
          uri: currentSong.uri,
          width: "100%",
          height: 152,
          theme: "dark"
        },
        (EmbedController) => {
          controller = EmbedController;

          controller.addListener("ready", () => {
            controllerReady = true;
            discButton.disabled = false;
            setDiscState(false);
          });

          controller.addListener("playback_started", () => {
            clearTimeout(fallbackTimer);
            fallback.classList.remove("show");
            setDiscState(true);
          });

          controller.addListener("playback_update", (event) => {
            if (typeof event.data.isPaused === "boolean") {
              setDiscState(!event.data.isPaused);
            }
          });
        }
      );
    };
  </script>

  <script
    src="https://open.spotify.com/embed/iframe-api/v1"
    async
  ></script>
</body>
</html>
